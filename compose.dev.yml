# Postgres-only for the `cargo run` inner loop; full stack is in compose.yml.
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hearth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hearth}
      POSTGRES_DB: ${POSTGRES_DB:-hearth}
    ports:
      - "5433:5432"
    volumes:
      - hearth_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hearth} -d ${POSTGRES_DB:-hearth}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hearth_pgdata:
